name: protocol-consistency

# 回应 LIMITATIONS.md 局限 5：让协议文档自身也享受「机器可判定的守护」。
# 每次 push / PR 自动跑结构一致性检查，复发即拦。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run protocol consistency check
        run: python3 agate/scripts/check-protocol-consistency.py
        # 默认仅 ERROR 判失败；WARNING 不阻断 CI。
        # 若要让 WARNING 也阻断（更严格），改为：
        #   run: python3 scripts/check-protocol-consistency.py --strict

  gate-backstop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run gate backstop check
        run: python3 agate/scripts/ci-gate-backstop.py
